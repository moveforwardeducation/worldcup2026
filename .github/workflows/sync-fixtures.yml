name: Sync fixtures & results

# Pulls the World Cup schedule + live results into Firestore.
# - Scheduled run keeps the bundled-free schedule fresh.
# - Manual run (workflow_dispatch) lets you trigger it on demand.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   FOOTBALL_API_KEY          Football-Data.org API token (free)
#   FIREBASE_SERVICE_ACCOUNT  Firebase service-account JSON (whole file contents)

on:
  workflow_dispatch:
  schedule:
    # Every 30 minutes. During match windows you can lower this (e.g. */5),
    # but mind the free API's rate limits.
    - cron: '*/30 * * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        working-directory: tools/sync_fixtures
        run: npm install --no-audit --no-fund

      - name: Sync fixtures to Firestore
        working-directory: tools/sync_fixtures
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          COMPETITION: WC
        run: node sync.js
